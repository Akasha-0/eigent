name: Secret Protection
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@latest
        with:
          path: ./
          base64: true
          binary: true
          debug: true
          output: results.json
      
      - name: Upload TruffleHog results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results
          path: results.json
          retention-days: 30
      
      - name: Fail if secrets found
        if: github.event_name == 'push'
        run: |
          if [ -f results.json ] && grep -q '"found":true' results.json; then
            echo "⚠️ Secrets detected! Check the artifacts for details."
            cat results.json
            exit 1
          fi

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run GitLeaks
        uses: zricethezav/gitleaks@v8
        with:
          args: --no-git --verbose --report gitleaks-report.json
      
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  pre-commit-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install git hooks
        run: |
          git config core.hooksPath .githooks || true
      
      - name: Create pre-commit hook for secrets
        run: |
          mkdir -p .githooks/pre-commit
          cat > .githooks/pre-commit/secrets-check << 'HOOK'
          #!/bin/bash
          # Pre-commit hook to check for secrets
          
          echo "🔒 Checking for secrets..."
          
          # Check for common secret patterns
          patterns=(
            "sk-[a-zA-Z0-9]{20,}"          # OpenAI keys
            "ghp_[a-zA-Z0-9]{36,}"         # GitHub tokens
            "AKIA[A-Z0-9]{16,}"            # AWS keys
            "-----BEGIN.*PRIVATE KEY-----" # Private keys
            "password\s*=\s*['\"][^'\"]{8,}"  # Passwords
            "api[_-]?key\s*=\s*['\"][^'\"]{8,}" # API keys
          )
          
          for pattern in "\${patterns[@]}"; do
            if grep -rEn "$pattern" . --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" 2>/dev/null | grep -v node_modules | grep -v ".git"; then
              echo "⚠️ Possible secret detected: $pattern"
              exit 1
            fi
          done
          
          echo "✅ No obvious secrets detected"
          HOOK
          chmod +x .githooks/pre-commit/secrets-check